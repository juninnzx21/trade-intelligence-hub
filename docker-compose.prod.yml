services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tradehub}
      POSTGRES_USER: ${POSTGRES_USER:-trade}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - .env.production
    depends_on:
      - postgres
      - redis

  worker:
    build:
      context: ./backend
    restart: unless-stopped
    command: ["python", "worker.py"]
    env_file:
      - .env.production
    depends_on:
      - postgres
      - redis

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_BASE: /api/v1
        VITE_WS_BASE: /api/v1
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "127.0.0.1:${WEB_PORT:-3001}:80"

volumes:
  postgres-data:
  redis-data:
